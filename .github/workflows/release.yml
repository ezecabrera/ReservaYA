name: Release

# Dispara al pushear un tag v*.*.* (ej: v0.2.0).
# - Crea un GitHub Release con las notas del CHANGELOG
# - (Futuro) Compila APK / IPA y los sube al release
# - (Futuro) Dispara deploy a Vercel production

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  github-release:
    name: Crear GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # para crear el release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extraer notas del CHANGELOG
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Extrae la sección de la versión actual del CHANGELOG.md
          NOTES=$(awk -v ver="## $VERSION" '
            $0 ~ ver {flag=1; next}
            flag && /^## [0-9]/ {exit}
            flag {print}
          ' docs/CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Crear release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

