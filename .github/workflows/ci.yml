name: CI

# Se ejecuta en cada push a main y en cada PR. Garantiza que el merge a
# main no rompe type-check, tests ni lint en ningún package.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type-check + Tests + Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Get pnpm store
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ─── Type-check 3/3 packages ────────────────────────────────
      - name: Type-check (shared)
        run: pnpm --filter @untoque/shared type-check

      - name: Type-check (panel)
        run: pnpm --filter @untoque/panel type-check

      - name: Type-check (app)
        run: pnpm --filter @untoque/app type-check

      # ─── Tests ──────────────────────────────────────────────────
      - name: Tests (panel)
        run: pnpm --filter @untoque/panel test

      # ─── Lint (warnings no bloquean) ─────────────────────────────
      - name: Lint (panel)
        run: pnpm --filter @untoque/panel lint
        continue-on-error: true

      - name: Lint (app)
        run: pnpm --filter @untoque/app lint
        continue-on-error: true
