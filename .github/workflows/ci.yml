name: CI

# Se ejecuta en cada push a main y en cada PR.
# Garantiza type-check + lint + build de todos los packages antes de mergear.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Env vars compartidas — placeholders para que los builds compilen sin credenciales reales.
env:
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
  SUPABASE_SERVICE_ROLE_KEY: placeholder
  QR_JWT_SECRET: ci-placeholder-secret-min-32-chars-xxxxx
  MERCADOPAGO_ACCESS_TOKEN: TEST-placeholder
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_PANEL_URL: http://localhost:3001

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Install — UNA vez, cache compartido con el resto de jobs
  # ───────────────────────────────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

  # ───────────────────────────────────────────────────────────────────────
  # Lint — PARALELO con type-check y build (ninguno depende del otro)
  # ───────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ['@untoque/app', '@untoque/panel']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Lint ${{ matrix.package }}
        run: pnpm --filter ${{ matrix.package }} lint

  type-check:
    name: Type-check
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ['@untoque/app', '@untoque/panel', '@untoque/shared']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Type-check ${{ matrix.package }}
        run: pnpm --filter ${{ matrix.package }} type-check

  build:
    name: Build
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ['@untoque/app', '@untoque/panel']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build ${{ matrix.package }}
        run: pnpm --filter ${{ matrix.package }} build

  # ───────────────────────────────────────────────────────────────────────
  # Commitlint — solo en PRs, valida los commits del PR cumplen Conventional Commits
  # ───────────────────────────────────────────────────────────────────────
  commitlint:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # commitlint necesita historial
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Validar commits del PR
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
