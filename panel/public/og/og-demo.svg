<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1A1B21"/>
  <rect x="0" y="0" width="1200" height="6" fill="#4F8A5F"/>
  <g font-family="Fraunces, 'Times New Roman', serif" fill="#F4F2EE">
    <text x="80" y="160" font-size="48" font-weight="900" letter-spacing="-2">UnToque · Demo</text>
    <text x="80" y="290" font-size="84" font-weight="800">Agendá una</text>
    <text x="80" y="380" font-size="84" font-weight="800" fill="#4F8A5F" font-style="italic">demo de 15min.</text>
  </g>
  <g font-family="'Plus Jakarta Sans', system-ui, sans-serif" fill="#A8A4A0">
    <text x="80" y="450" font-size="26" font-weight="500">Te mostramos el panel con tu menú real, tus mesas, tu data.</text>
    <text x="80" y="490" font-size="26" font-weight="500">Sin compromiso. Sin tarjeta de crédito.</text>
  </g>
  <g transform="translate(80,540)">
    <rect width="280" height="64" rx="32" fill="#4F8A5F"/>
    <text x="140" y="42" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="22" font-weight="800" fill="#FFFFFF" text-anchor="middle">Reservar slot</text>
  </g>
  <g transform="translate(900,100)" opacity="0.9">
    <circle cx="100" cy="100" r="100" fill="#E4CDED"/>
    <text x="100" y="150" font-family="Fraunces, serif" font-size="150" font-weight="800" fill="#A13143" text-anchor="middle" font-style="italic">u</text>
  </g>
  <!-- Convert to PNG: npx svgo og-demo.svg && sharp resize 1200x630 og-demo.png -->
</svg>
